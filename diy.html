<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<title>Your code is ready — Foxes.ai DIY Setup Guide</title>
<meta name="description" content="Everything you need to deploy your Foxes.ai website yourself. Hosting, DNS, SSL, email, analytics — the full step-by-step guide." />
<meta name="robots" content="noindex, follow" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: '#F7F4EE',
          'cream-2': '#F0ECE3',
          ink: '#0A0A0A',
          amber: '#C9531E',
          forest: '#1F3B2D',
          rule: '#E8E2D5',
          muted: '#6B6B6B',
        },
        fontFamily: {
          display: ['Fraunces', 'Georgia', 'serif'],
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>

<style>
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #F7F4EE; color: #0A0A0A; }
  .font-display { font-family: 'Fraunces', Georgia, serif; font-optical-sizing: auto; }
  .display-tight { letter-spacing: -0.02em; line-height: 1.02; }
  .eyebrow { letter-spacing: 0.14em; }
  .italic-fraunces { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 400; }
  .link-u { background-image: linear-gradient(currentColor, currentColor); background-size: 0% 1px; background-position: 0 100%; background-repeat: no-repeat; transition: background-size 250ms ease; }
  .link-u:hover { background-size: 100% 1px; }
  .tnum { font-variant-numeric: tabular-nums; }
  .balance { text-wrap: balance; }
  .pretty  { text-wrap: pretty; }
  .acc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 300ms ease; }
  .acc-body.open { grid-template-rows: 1fr; }
  .acc-body > div { overflow: hidden; }
  .chev { transition: transform 300ms ease; }
  .open .chev { transform: rotate(180deg); }
  @media print {
    body { background: white !important; color: black !important; }
    .no-print { display: none !important; }
    .acc-body { grid-template-rows: 1fr !important; }
    .acc-body > div { overflow: visible !important; }
    section { page-break-inside: avoid; padding: 24px 0 !important; }
    header { position: static !important; }
    * { box-shadow: none !important; background-image: none !important; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
